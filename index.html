<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ministério de Dança – Igreja Hermom</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#FDF4FB;min-height:100vh;color:#2C1020}
  :root{--p:#C9607E;--d:#854278;--border:#EDD5E8;--light:#FDF4FB;--muted:#8B6080;--text:#2C1020}

  #header{background:linear-gradient(135deg,var(--p),var(--d));color:#fff;padding:18px 16px 0;position:sticky;top:0;z-index:100}
  #header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  #header-top h1{font-size:20px;font-weight:800}
  #header-top p{font-size:13px;opacity:.85}
  #tabs{display:flex;gap:2px}
  .tab-btn{flex:1;background:transparent;color:rgba(255,255,255,.75);border:none;border-radius:10px 10px 0 0;padding:8px 4px;cursor:pointer;font-size:11px;font-weight:700}
  .tab-btn.active{background:#fff;color:var(--p)}
  .tab-btn svg{display:block;margin:0 auto 3px}

  #summary{background:#fff;padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px}
  .sum-item{flex:1;text-align:center}
  .sum-n{font-size:18px;font-weight:800;color:var(--p)}
  .sum-l{font-size:10px;color:var(--muted);font-weight:600}

  #content{padding:16px}
  .tab-panel{display:none}.tab-panel.active{display:block}

  .card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
  .card-header{background:linear-gradient(135deg,var(--d),var(--p));color:#fff;padding:14px 16px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
  .card-body{padding:12px 16px;border-bottom:1px solid var(--border)}
  .card-footer{padding:10px 16px;background:var(--light)}

  .sec-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .sec-title h2{font-size:18px;font-weight:700}
  .sec-title p{font-size:13px;color:var(--muted)}

  .btn{border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--p);color:#fff}
  .btn-ghost{background:#f3e5f5;color:var(--d)}
  .btn-danger{background:#c62828;color:#fff}
  .btn-sm{padding:5px 12px;font-size:13px}
  .btn-icon{background:#ffffff33;border:none;color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:14px}

  .badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}

  .modal-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:1000;align-items:center;justify-content:center;padding:16px}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .modal-header{background:var(--p);color:#fff;padding:14px 18px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:15px}
  .modal-body{padding:18px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;outline:none;background:var(--light);color:var(--text);font-family:inherit}
  .field textarea{resize:vertical;min-height:72px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

  .member-row{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
  .member-row:last-child{border-bottom:none}
  .member-row.present{background:#e8f5e9}
  .check-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
  .check-circle.on{background:#2E7D32;color:#fff}
  .check-circle.off{background:#e0e0e0}

  .obs-input{width:100%;margin-top:6px;padding:6px 10px;border-radius:6px;border:1.5px solid var(--border);font-size:12px;color:var(--text);background:#fff8fb;outline:none;font-family:inherit;resize:none}
  .obs-input:focus{border-color:var(--p)}

  .session-chip{border-radius:12px;padding:9px 14px;cursor:pointer;border:2px solid var(--border);background:#fff;min-width:95px;text-align:center}
  .session-chip.active{background:var(--p);color:#fff;border-color:var(--p)}
  .session-chip h4{font-size:14px;font-weight:700}
  .session-chip p{font-size:12px;opacity:.8}

  .status-row{display:flex;gap:6px;flex-wrap:wrap}
  .status-btn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted)}

  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .filter-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
  .filter-chip.active{background:var(--p);color:#fff;border-color:var(--p)}

  .warn-bar{padding:8px 16px;background:#fff3e0;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:#E65100}

  .media-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .media-open{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;color:#fff}
  .media-link{background:#f3e5f5;color:var(--d);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;text-decoration:none}
  .media-player-wrap{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:8px}
  .media-player-bar{background:var(--light);padding:6px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:600}
  .media-player-bar a{color:var(--p);font-weight:600;font-size:12px}
  .media-player-bar button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px}

  .empty{text-align:center;padding:40px;color:var(--muted)}
  .inactive-label{font-size:13px;font-weight:700;color:var(--muted);margin:18px 0 8px}
  .link-detected{font-size:12px;margin-top:4px;font-weight:600}

  /* Histórico bailarina */
  .member-filter-box{background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:18px}
  .member-filter-box h3{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--d)}
  .member-filter-box select{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;outline:none;background:var(--light);color:var(--text);cursor:pointer}
  .history-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
  .history-table th{background:var(--light);padding:7px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
  .history-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
  .history-table tr:last-child td{border-bottom:none}
  .pill-present{background:#e8f5e9;color:#2E7D32;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;display:inline-block}
  .pill-absent{background:#fce4ec;color:#c62828;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;display:inline-block}
  .history-stats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
  .history-stat{flex:1;min-width:80px;text-align:center;background:var(--light);border-radius:8px;padding:8px}
  .history-stat .n{font-size:20px;font-weight:800;color:var(--p)}
  .history-stat .l{font-size:11px;color:var(--muted);font-weight:600}

  /* ── FIGURINOS (novo) ── */
  .costume-style-card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
  .costume-style-header{background:linear-gradient(135deg,var(--d),var(--p));color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
  .costume-style-header .title{font-weight:700;font-size:15px}
  .costume-style-header .subtitle{font-size:12px;opacity:.85;margin-top:2px}
  .costume-style-header .chevron{font-size:16px;transition:transform .2s}
  .costume-style-header.open .chevron{transform:rotate(180deg)}
  .costume-member-list{display:none}
  .costume-member-list.open{display:block}
  .costume-member-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
  .costume-member-row:last-child{border-bottom:none}
  .costume-status-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700}
  .costume-summary-bar{display:flex;gap:0;border-bottom:1px solid var(--border)}
  .costume-sum-item{flex:1;text-align:center;padding:8px 4px;border-right:1px solid var(--border)}
  .costume-sum-item:last-child{border-right:none}
  .costume-sum-item .n{font-size:16px;font-weight:800}
  .costume-sum-item .l{font-size:10px;color:var(--muted);font-weight:600}
  .loan-info{font-size:11px;color:var(--muted);margin-top:2px}

  /* ANIVERSÁRIOS */
  .bday-today{background:linear-gradient(135deg,#fff8e1,#fff3cd);border:2px solid #FFD600;border-radius:14px;padding:16px;margin-bottom:16px;text-align:center}
  .bday-today .bday-emoji{font-size:40px;margin-bottom:6px}
  .bday-today h3{font-size:17px;font-weight:800;color:#B8860B;margin-bottom:4px}
  .bday-today p{font-size:13px;color:#8B6914}
  .month-label{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:1px;margin:16px 0 8px;text-transform:uppercase}
  .bday-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
  .bday-card.today{border-color:#FFD600;background:#fffdf0}
  .bday-date{font-size:22px;font-weight:800;color:var(--p);min-width:36px;text-align:center;line-height:1}
  .bday-date span{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase}
  .wpp-btn{display:inline-flex;align-items:center;gap:5px;background:#25D366;color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none}
</style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCx6KXqx3Qhk8Y2J-FuxAVNUe0mkpb2RsY",
  authDomain:        "ministerio-danca.firebaseapp.com",
  databaseURL:       "https://ministerio-danca-default-rtdb.firebaseio.com",
  projectId:         "ministerio-danca",
  storageBucket:     "ministerio-danca.firebasestorage.app",
  messagingSenderId: "697046196478",
  appId:             "1:697046196478:web:a3401e38676dbf0bd8c5af"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

let state = { members:{}, attendance:{}, choreographies:{}, costumes:{} };
let activeTab = "members";
let selectedSession = null;
let choreoFilter = "all";
let attMemberFilter = "";
let openedCostume = null; // estilo de roupa expandido

["members","attendance","choreographies","costumes"].forEach(k => {
  onValue(ref(db, k), snap => { state[k] = snap.val() || {}; render(); });
});

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(d){ if(!d) return ""; const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; }
function avatarColor(name){ const hue=[...name].reduce((a,c)=>a+c.charCodeAt(0),0)%360; return `hsl(${hue},55%,62%)`; }
function initials(name){ return name.split(" ").map(n=>n[0]).slice(0,2).join("").toUpperCase(); }
function activeMembers(){ return Object.entries(state.members).filter(([,m])=>m.active).map(([id,m])=>({id,...m})); }
function getMember(id){ const m=state.members[id]; return m?{id,...m}:null; }

function ytId(url){
  if(!url) return null;
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?/\s]{11})/);
  return m?m[1]:null;
}
function spotifyEmbed(url){
  if(!url) return null;
  const m=url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
  return m?`https://open.spotify.com/embed/${m[1]}/${m[2]}`:null;
}
function linkType(url){
  if(!url) return null;
  if(url.includes("youtube.com")||url.includes("youtu.be")) return "youtube";
  if(url.includes("spotify.com")) return "spotify";
  return "other";
}

function tutuSVG(size=24, color="#C9607E"){
  return `<svg width="${size}" height="${size}" viewBox="0 0 32 32">
    <path d="M13.5 3 Q16 2 18.5 3 L18 10 L14 10 Z" fill="${color}"/>
    <line x1="14" y1="3.5" x2="12" y2="3" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="3.5" x2="20" y2="3" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="16" cy="12.5" rx="8.5" ry="4" fill="${color}" opacity="1"/>
    <ellipse cx="16" cy="15" rx="11" ry="3.8" fill="${color}" opacity="0.7"/>
    <ellipse cx="16" cy="17.5" rx="13" ry="3.5" fill="${color}" opacity="0.45"/>
  </svg>`;
}

const ROLE_LABEL = { lider:"👑 Líder", co_lider:"🌟 Co-líder", auxiliar:"🤝 Auxiliar" };
const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

const CHOREO_STATUS = {
  planejado:   { label:"Planejado", color:"#8B6080", icon:"📋" },
  em_ensaio:   { label:"Em Ensaio", color:"#E65100", icon:"🎵" },
  pronto:      { label:"Pronto", color:"#2E7D32", icon:"✅" },
  apresentado: { label:"Apresentado", color:"#1565C0", icon:"🌟" },
};

// ── status de figurino por bailarina ──
const ASSIGN_STATUS = {
  na_igreja:  { label:"Na Igreja",       color:"#2E7D32", icon:"🏛️" },
  em_casa:    { label:"Levou p/ Casa",   color:"#E65100", icon:"🏠" },
  emprestado: { label:"Emprestado",      color:"#6A1B9A", icon:"🔄" },
  recebido:   { label:"Recebido",        color:"#1565C0", icon:"📦" },
};

function chorBadge(status){
  const s = CHOREO_STATUS[status] || CHOREO_STATUS.planejado;
  return `<span class="badge" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}55">${s.icon} ${s.label}</span>`;
}
function assignBadge(status){
  const s = ASSIGN_STATUS[status] || ASSIGN_STATUS.na_igreja;
  return `<span class="costume-status-badge" style="background:${s.color}18;color:${s.color};border:1px solid ${s.color}44">${s.icon} ${s.label}</span>`;
}

// retorna o assignment de um membro num figurino (ou default)
function getAssign(costumeId, memberId){
  return state.costumes[costumeId]?.assignments?.[memberId] || { status:"na_igreja" };
}

window.maskPhone = function(el){
  let v = el.value.replace(/\D/g,"").slice(0,11);
  if(v.length > 10)      v = v.replace(/^(\d{2})(\d{5})(\d{4})$/,"($1) $2-$3");
  else if(v.length > 6)  v = v.replace(/^(\d{2})(\d{4})(\d*)$/,"($1) $2-$3");
  else if(v.length > 2)  v = v.replace(/^(\d{2})(\d*)$/,"($1) $2");
  else if(v.length > 0)  v = v.replace(/^(\d*)$/,"($1");
  el.value = v;
};

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab===activeTab));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(`panel-${activeTab}`)?.classList.add("active");
  renderSummary();
  if(activeTab==="members")           renderMembers();
  else if(activeTab==="attendance")   renderAttendance();
  else if(activeTab==="choreo")       renderChoreo();
  else if(activeTab==="costumes")     renderCostumes();
  else if(activeTab==="aniversarios") renderAniversarios();
}

function renderSummary(){
  document.getElementById("sum-bailarinas").textContent = activeMembers().length;
  document.getElementById("sum-ensaios").textContent = Object.keys(state.attendance).length;
  document.getElementById("sum-coreografias").textContent = Object.values(state.choreographies).filter(c=>c.status==="em_ensaio").length;
  document.getElementById("sum-figurinos").textContent = Object.keys(state.costumes).length;
}

// ── MEMBERS ───────────────────────────────────────────────────────────────────
function wppLink(num, label, name, isMae){
  const clean = num.replace(/\D/g,"");
  const msg = isMae ? encodeURIComponent(`🎂 Feliz aniversário para ${name}! Que Deus a abençoe! 🎉`) : "";
  const wppIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.116 1.524 5.847L0 24l6.344-1.498A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.651-.502-5.176-1.381l-.371-.22-3.768.89.937-3.658-.242-.381A9.944 9.944 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;
  return `<a class="wpp-btn" href="https://wa.me/55${clean}" target="_blank">${wppIcon} ${label}</a>`;
}

function renderMembers(){
  const all = Object.entries(state.members).map(([id,m])=>({id,...m}));
  const active = all.filter(m=>m.active);
  const inactive = all.filter(m=>!m.active);
  const el = document.getElementById("panel-members");
  el.innerHTML = `
    <div class="sec-title">
      <div><h2>🩰 Membros</h2><p>${active.length} ativas · ${inactive.length} inativas</p></div>
      <button class="btn btn-primary btn-sm" onclick="openMemberModal()">+ Adicionar</button>
    </div>
    ${active.map(m => memberCard(m)).join("")}
    ${inactive.length>0?`<div class="inactive-label">INATIVAS</div>${inactive.map(m=>`
      <div class="card" style="display:flex;align-items:center;gap:12px;opacity:.6;background:#f5f5f5">
        <div class="avatar" style="width:32px;height:32px;font-size:12px;background:${avatarColor(m.name)}">${initials(m.name)}</div>
        <div style="flex:1;font-size:14px;color:var(--muted)">${esc(m.name)}</div>
        <button class="btn btn-ghost btn-sm" onclick="openMemberModal('${m.id}')">✏️</button>
      </div>`).join("")}`:""}
    ${all.length===0?`<div class="empty">${tutuSVG(52)}<p style="margin-top:8px">Nenhum membro cadastrado ainda</p></div>`:""}
  `;
}

function memberCard(m){
  const bdayFmt = m.dataNascimento ? (()=>{ const [y,mo,d]=m.dataNascimento.split("-"); return `${d}/${mo}/${y}`; })() : "";
  return `<div class="card" style="display:flex;align-items:center;gap:12px">
    <div class="avatar" style="width:38px;height:38px;font-size:14px;background:${avatarColor(m.name)}">${initials(m.name)}</div>
    <div style="flex:1">
      <div style="font-weight:700;font-size:15px">${esc(m.name)}</div>
      <div style="font-size:12px;color:var(--muted)">${ROLE_LABEL[m.role]||"🩰 Bailarina"}${m.mother?` · 👩 ${esc(m.mother)}`:""}</div>
      ${bdayFmt?`<div style="font-size:12px;color:var(--muted)">🎂 ${bdayFmt}</div>`:""}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
        ${m.whatsapp?wppLink(m.whatsapp,"Bailarina",m.name,false):""}
        ${m.whatsappMae?wppLink(m.whatsappMae,"Mãe",m.name,true):""}
      </div>
    </div>

function renderAttendance(){
  const sessions = Object.entries(state.attendance).map(([id,s])=>({id,...s})).sort((a,b)=>b.date.localeCompare(a.date));
  const cur = sessions.find(s=>s.id===selectedSession);
  const am = activeMembers();
  const el = document.getElementById("panel-attendance");

  const filterBlock = `
    <div class="member-filter-box">
      <h3>🔍 Histórico por bailarina</h3>
      <select onchange="setAttMemberFilter(this.value)">
        <option value="">Selecione uma bailarina...</option>
        ${am.map(m=>`<option value="${m.id}" ${attMemberFilter===m.id?"selected":""}>${esc(m.name)}</option>`).join("")}
      </select>
      ${attMemberFilter ? renderMemberHistory(attMemberFilter, sessions) : ""}
    </div>`;

  el.innerHTML = `
    <div class="sec-title">
      <div><h2>📋 Lista de Presença</h2><p>${sessions.length} ensaio(s)</p></div>
      <button class="btn btn-primary btn-sm" onclick="openAttModal()">+ Novo Ensaio</button>
    </div>
    ${filterBlock}
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      ${sessions.map(s=>{
        const cnt=s.records?Object.values(s.records).filter(r=>r.present).length:0;
        const tot=s.records?Object.values(s.records).length:0;
        return `<div class="session-chip${s.id===selectedSession?" active":""}" onclick="selectSession('${s.id}')">
          <h4>${fmtDate(s.date)}</h4><p>${cnt}/${tot} presentes</p></div>`;
      }).join("")}
    </div>
    ${cur ? `
    <div style="background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden">
      <div style="background:var(--p);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
        <div><b>Ensaio – ${fmtDate(cur.date)}</b>${cur.notes?`<div style="font-size:12px;opacity:.85">${esc(cur.notes)}</div>`:""}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:13px">${cur.records?Object.values(cur.records).filter(r=>r.present).length:0}/${cur.records?Object.values(cur.records).length:0}</span>
          <button class="btn-icon" onclick="deleteSession('${cur.id}')">🗑️</button>
        </div>
      </div>
      ${am.length===0
        ? `<div style="padding:20px;text-align:center;color:var(--muted)">Cadastre membros primeiro</div>`
        : am.map(m=>{
            const rec = cur.records ? Object.values(cur.records).find(r=>r.memberId===m.id) : null;
            const present = rec?.present||false;
            const obs = rec?.obs||"";
            return `<div class="member-row${present?" present":""}" id="mrow-${cur.id}-${m.id}">
              <div style="display:flex;align-items:center;gap:12px;flex:1;cursor:pointer" onclick="toggleAttendance('${cur.id}','${m.id}')">
                <div class="avatar" style="width:34px;height:34px;font-size:13px;background:${avatarColor(m.name)};flex-shrink:0">${initials(m.name)}</div>
                <div style="flex:1">
                  <div style="font-weight:600;font-size:14px">${esc(m.name)}</div>
                  <div style="font-size:12px;color:var(--muted)">${ROLE_LABEL[m.role]||"🩰 Bailarina"}</div>
                  ${!present ? `
                    <textarea class="obs-input" rows="1"
                      placeholder="Motivo da falta (opcional)..."
                      onclick="event.stopPropagation()"
                      onblur="saveObs('${cur.id}','${m.id}',this.value)"
                    >${esc(obs)}</textarea>` : ""}
                  ${!present && obs ? `<div style="font-size:11px;color:#c62828;margin-top:2px">📝 ${esc(obs)}</div>` : ""}
                </div>
              </div>
              <div class="check-circle ${present?"on":"off"}" onclick="toggleAttendance('${cur.id}','${m.id}')" style="cursor:pointer">${present?"✓":""}</div>
            </div>`;
          }).join("")
      }
    </div>` : ""}
    ${sessions.length===0?`<div class="empty"><div style="font-size:48px;margin-bottom:8px">📋</div><p>Nenhum ensaio registrado</p></div>`:""}
  `;
}

function renderMemberHistory(memberId, sessions){
  const m = getMember(memberId); if(!m) return "";
  let presentes=0, faltas=0;
  const rows = [...sessions].reverse().map(s=>{
    const rec = s.records ? Object.values(s.records).find(r=>r.memberId===memberId) : null;
    const present = rec?.present||false;
    const obs = rec?.obs||"";
    if(present) presentes++; else faltas++;
    return `<tr>
      <td style="font-weight:600">${fmtDate(s.date)}</td>
      <td>${s.notes?`<span style="font-size:12px;color:var(--muted)">${esc(s.notes)}</span>`:"-"}</td>
      <td>${present?`<span class="pill-present">✓ Presente</span>`:`<span class="pill-absent">✗ Faltou</span>`}</td>
      <td style="font-size:12px;color:var(--muted)">${obs?esc(obs):"-"}</td>
    </tr>`;
  }).join("");
  const pct = sessions.length ? Math.round(presentes/sessions.length*100) : 0;
  return `
    <div class="history-stats">
      <div class="history-stat"><div class="n" style="color:#2E7D32">${presentes}</div><div class="l">Presenças</div></div>
      <div class="history-stat"><div class="n" style="color:#c62828">${faltas}</div><div class="l">Faltas</div></div>
      <div class="history-stat"><div class="n">${pct}%</div><div class="l">Frequência</div></div>
    </div>
    ${sessions.length>0?`<div style="overflow-x:auto;margin-top:4px">
      <table class="history-table">
        <thead><tr><th>Data</th><th>Ensaio</th><th>Status</th><th>Observação</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`:`<div style="text-align:center;padding:12px;font-size:13px;color:var(--muted)">Nenhum ensaio ainda</div>`}`;
}

window.setAttMemberFilter = function(val){ attMemberFilter=val; renderAttendance(); };
window.openAttModal = function(){ document.getElementById("att-date").value=""; document.getElementById("att-notes").value=""; openModal("modal-att"); };
window.saveSession = async function(){
  const date=document.getElementById("att-date").value;
  if(!date){ alert("Selecione a data"); return; }
  const notes=document.getElementById("att-notes").value.trim();
  const am=activeMembers(); const records={};
  am.forEach(m=>{ const k=push(ref(db,"_tmp")).key; records[k]={memberId:m.id,present:false,obs:""}; });
  const newRef=push(ref(db,"attendance"));
  await set(newRef,{date,notes,records});
  selectedSession=newRef.key; closeModal("modal-att");
};
window.selectSession = function(id){ selectedSession=selectedSession===id?null:id; renderAttendance(); };
window.toggleAttendance = async function(sessionId,memberId){
  const session=state.attendance[sessionId]; if(!session) return;
  const records=session.records||{};
  const key=Object.keys(records).find(k=>records[k].memberId===memberId);
  if(key) await update(ref(db,`attendance/${sessionId}/records/${key}`),{present:!records[key].present});
  else { const k=push(ref(db,"_tmp")).key; await set(ref(db,`attendance/${sessionId}/records/${k}`),{memberId,present:true,obs:""}); }
};
window.saveObs = async function(sessionId, memberId, obs){
  const session=state.attendance[sessionId]; if(!session) return;
  const records=session.records||{};
  const key=Object.keys(records).find(k=>records[k].memberId===memberId);
  if(key) await update(ref(db,`attendance/${sessionId}/records/${key}`),{obs});
  else { const k=push(ref(db,"_tmp")).key; await set(ref(db,`attendance/${sessionId}/records/${k}`),{memberId,present:false,obs}); }
};
window.deleteSession = async function(id){
  if(confirm("Remover este ensaio?")){ await remove(ref(db,`attendance/${id}`)); if(selectedSession===id) selectedSession=null; }
};

function renderMediaBtns(id, url, btnLabel, extLabel){
  const lt=linkType(url);
  const color=lt==="youtube"?"#FF0000":lt==="spotify"?"#1DB954":"#C9607E";
  const lbl = btnLabel||(lt==="youtube"?"▶ Assistir aqui":lt==="spotify"?"🎧 Ouvir aqui":"▶ Abrir");
  const ext = extLabel||(lt==="youtube"?"↗ Abrir no YouTube":lt==="spotify"?"↗ Abrir no Spotify":"↗ Abrir link");
  return `<div class="media-btns">
    <button class="media-open" style="background:${color}" onclick="openPlayer('${id}','${encodeURIComponent(url)}')">${lbl}</button>
    <a class="media-link" href="${esc(url)}" target="_blank">${ext}</a>
  </div>`;
}
window.openPlayer = function(id, encodedUrl){
  const url=decodeURIComponent(encodedUrl), lt=linkType(url), yt=ytId(url), sp=spotifyEmbed(url);
  const label=lt==="youtube"?"▶ YouTube":"🎧 Spotify";
  let iframe="";
  if(lt==="youtube"&&yt){
    iframe=`<div style="position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden"><iframe style="position:absolute;top:0;left:0;width:100%;height:100%;border:none" src="https://www.youtube.com/embed/${yt}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>`;
  } else if(lt==="spotify"&&sp){
    iframe=`<iframe src="${sp}" height="152" allow="autoplay;encrypted-media" style="width:100%;border:none"></iframe>`;
  } else {
    iframe=`<div style="padding:12px;text-align:center"><a href="${esc(url)}" target="_blank" style="color:var(--p)">Abrir link externo ↗</a></div>`;
  }
  document.getElementById(`media-${id}`).innerHTML=`
    <div class="media-player-wrap">
      <div class="media-player-bar"><span>${label}</span>
        <div style="display:flex;gap:8px">
          <a href="${esc(url)}" target="_blank">↗ Abrir</a>
          <button onclick="closePlayer('${id}','${encodeURIComponent(url)}')">✕</button>
        </div>
      </div>${iframe}</div>`;
};
window.closePlayer = function(id, encodedUrl){
  const url=decodeURIComponent(encodedUrl);
  const isGrav=id.startsWith("grav-");
  document.getElementById(`media-${id}`).innerHTML=renderMediaBtns(id, url,
    isGrav?"🩰 Ver Gravação da Dança":undefined, isGrav?"↗ Abrir":undefined);
};

                <div style="margin-top:3px">${assignBadge(a.status)}</div>
                ${a.status==="emprestado"&&loanToName
                  ? `<div class="loan-info">🔄 Emprestado para <b>${esc(loanToName)}</b>${a.date?` em ${fmtDate(a.date)}`:""}</div>` : ""}
                ${a.status==="recebido"&&loanFromName
                  ? `<div class="loan-info">📦 Recebido de <b>${esc(loanFromName)}</b>${a.date?` em ${fmtDate(a.date)}`:""}</div>` : ""}
                ${a.notes?`<div class="loan-info">📝 ${esc(a.notes)}</div>`:""}
              </div>
              <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0">
                ${a.status==="na_igreja" ? `
                  <button class="btn btn-ghost btn-sm" onclick="openStatusModal('${c.id}','${m.id}')">✏️ Registrar</button>` : ""}
                ${a.status==="em_casa" ? `
                  <button class="btn btn-ghost btn-sm" onclick="openStatusModal('${c.id}','${m.id}')">✏️ Alterar</button>
                  <button class="btn btn-primary btn-sm" onclick="returnToChurch('${c.id}','${m.id}')">🏛️ Devolveu</button>` : ""}
                ${a.status==="emprestado" ? `
                  <button class="btn btn-primary btn-sm" onclick="returnLoan('${c.id}','${m.id}')">↩️ Devolvida</button>` : ""}
                ${a.status==="recebido" ? `
                  <button class="btn btn-primary btn-sm" onclick="returnLoan('${c.id}','${a.loanFromId}')">↩️ Devolver</button>` : ""}
              </div>
            </div>`;
          }).join("")
      }
    </div>
  </div>`;
}

window.toggleCostume = function(id){ openedCostume = openedCostume===id ? null : id; renderCostumes(); };

// ── modal: novo/editar estilo ──
window.openCostumeModal = function(id){
  const c = id ? state.costumes[id] : null;
  document.getElementById("costume-modal-title").textContent = c?"Editar Estilo":"Novo Estilo de Roupa";
  document.getElementById("costume-id").value = id||"";
  document.getElementById("costume-name").value = c?.name||"";
  document.getElementById("costume-desc").value = c?.description||"";
  openModal("modal-costume");
};
window.saveCostume = async function(){
  const id   = document.getElementById("costume-id").value;
  const name = document.getElementById("costume-name").value.trim();
  if(!name){ alert("Nome obrigatório"); return; }
  const desc = document.getElementById("costume-desc").value.trim();
  if(id) await update(ref(db,`costumes/${id}`),{name,description:desc});
  else   await push(ref(db,"costumes"),{name,description:desc,assignments:{}});
  closeModal("modal-costume");
};
window.deleteCostume = async function(id){
  if(confirm("Remover este estilo de roupa? Todos os registros serão apagados."))
    await remove(ref(db,`costumes/${id}`));
};

// ── modal: registrar status de uma bailarina ──
window.openStatusModal = function(costumeId, memberId){
  const a = getAssign(costumeId, memberId);
  const m = getMember(memberId);
  const am = activeMembers().filter(x => x.id !== memberId);
  document.getElementById("status-costume-id").value  = costumeId;
  document.getElementById("status-member-id").value   = memberId;
  document.getElementById("status-modal-title").textContent = `Figurino – ${m?.name||""}`;
  document.getElementById("status-select").value = a.status||"na_igreja";
  document.getElementById("status-notes").value  = a.notes||"";
  // preenche select de para quem emprestar
  const loanSel = document.getElementById("status-loan-to");
  loanSel.innerHTML = `<option value="">Selecione a bailarina...</option>${am.map(x=>`<option value="${x.id}"${a.loanToId===x.id?" selected":""}>${esc(x.name)}</option>`).join("")}`;
  toggleLoanField();
  openModal("modal-status");
};
window.toggleLoanField = function(){
  const v = document.getElementById("status-select").value;
  document.getElementById("loan-field").style.display = v==="emprestado" ? "block" : "none";
};
window.saveStatus = async function(){
  const costumeId = document.getElementById("status-costume-id").value;
  const memberId  = document.getElementById("status-member-id").value;
  const status    = document.getElementById("status-select").value;
  const notes     = document.getElementById("status-notes").value.trim();
  const loanToId  = document.getElementById("status-loan-to").value;
  const date      = new Date().toISOString().slice(0,10);

  if(status==="emprestado"){
    if(!loanToId){ alert("Selecione para quem vai emprestar"); return; }
    // atualiza quem emprestou
    await set(ref(db,`costumes/${costumeId}/assignments/${memberId}`),
      {status:"emprestado", loanToId, date, notes});
    // atualiza quem recebeu
    await set(ref(db,`costumes/${costumeId}/assignments/${loanToId}`),
      {status:"recebido", loanFromId:memberId, date, notes:""});
  } else {
    // se estava emprestado, limpa o lado de quem recebeu
    const prev = getAssign(costumeId, memberId);
    if(prev.status==="emprestado" && prev.loanToId){
      await set(ref(db,`costumes/${costumeId}/assignments/${prev.loanToId}`),
        {status:"na_igreja", date});
    }
    await set(ref(db,`costumes/${costumeId}/assignments/${memberId}`),
      {status, date, notes});
  }
  closeModal("modal-status");
};

// ── devolver roupa emprestada (zera os dois lados) ──
window.returnLoan = async function(costumeId, lenderMemberId){
  const a = getAssign(costumeId, lenderMemberId);
  const date = new Date().toISOString().slice(0,10);
  // zera quem emprestou
  await set(ref(db,`costumes/${costumeId}/assignments/${lenderMemberId}`),
    {status:"na_igreja", date});
  // zera quem recebeu
  if(a.loanToId){
    await set(ref(db,`costumes/${costumeId}/assignments/${a.loanToId}`),
      {status:"na_igreja", date});
  }
};

// ── devolver para a igreja (em_casa → na_igreja) ──
window.returnToChurch = async function(costumeId, memberId){
  const date = new Date().toISOString().slice(0,10);
  await set(ref(db,`costumes/${costumeId}/assignments/${memberId}`),
    {status:"na_igreja", date});
};

// ── ANIVERSÁRIOS ──────────────────────────────────────────────────────────────
function renderAniversarios(){
  const el=document.getElementById("panel-aniversarios");
  const today=new Date(), todayDay=today.getDate(), todayMonth=today.getMonth()+1;
  const all=Object.entries(state.members).map(([id,m])=>({id,...m})).filter(m=>m.active&&m.dataNascimento);
  if(all.length===0){
    el.innerHTML=`<div class="sec-title"><div><h2>🎂 Aniversariantes</h2></div></div>
      <div class="empty"><div style="font-size:48px;margin-bottom:8px">🎂</div><p>Cadastre datas de nascimento nos membros para ver aqui</p></div>`;
    return;
  }
  all.sort((a,b)=>{ const [,am,ad]=a.dataNascimento.split("-").map(Number),[,bm,bd]=b.dataNascimento.split("-").map(Number); return am!==bm?am-bm:ad-bd; });
  const todayBdays=all.filter(m=>{ const [,mo,d]=m.dataNascimento.split("-").map(Number); return mo===todayMonth&&d===todayDay; });
  const byMonth={};
  all.forEach(m=>{ const [,mo]=m.dataNascimento.split("-").map(Number); if(!byMonth[mo]) byMonth[mo]=[]; byMonth[mo].push(m); });
  const wppIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.116 1.524 5.847L0 24l6.344-1.498A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.651-.502-5.176-1.381l-.371-.22-3.768.89.937-3.658-.242-.381A9.944 9.944 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;
  const bdayWppBtn=(num,label,bg,name)=>{
    const clean=num.replace(/\D/g,"");
    const msg=encodeURIComponent(`🎂 Feliz aniversário, ${name}! Que Deus te abençoe muito! 🎉`);
    return `<a class="wpp-btn" style="background:${bg}" href="https://wa.me/55${clean}?text=${msg}" target="_blank">${wppIcon} ${label}</a>`;
  };
  let html=`<div class="sec-title"><div><h2>🎂 Aniversariantes</h2><p>${all.length} membro(s) com data cadastrada</p></div></div>`;
  if(todayBdays.length>0){
    todayBdays.forEach(m=>{
      const [y]=m.dataNascimento.split("-").map(Number);
      const age=today.getFullYear()-y;
      html+=`<div class="bday-today"><div class="bday-emoji">🎉</div>
        <h3>Hoje é aniversário de ${esc(m.name)}!</h3>
        <p>${age} anos · ${ROLE_LABEL[m.role]||"🩰 Bailarina"}</p>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap">
          ${m.whatsapp?bdayWppBtn(m.whatsapp,"Bailarina","#25D366",m.name):""}
          ${m.whatsappMae?bdayWppBtn(m.whatsappMae,"Mãe","#854278",m.name):""}
        </div></div>`;
    });
  }
  Object.keys(byMonth).sort((a,b)=>a-b).forEach(mo=>{
    html+=`<div class="month-label">📅 ${MONTHS_PT[mo-1]}</div>`;
    byMonth[mo].forEach(m=>{
      const [y,,d]=m.dataNascimento.split("-").map(Number);
      const age=today.getFullYear()-y;
      const isToday=Number(mo)===todayMonth&&d===todayDay;
      html+=`<div class="bday-card${isToday?" today":""}">
        <div class="bday-date">${String(d).padStart(2,"0")}<span>${MONTHS_PT[mo-1].slice(0,3)}</span></div>
        <div class="avatar" style="width:36px;height:36px;font-size:13px;background:${avatarColor(m.name)}">${initials(m.name)}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px">${esc(m.name)}${isToday?" 🎉":""}</div>
          <div style="font-size:12px;color:var(--muted)">${age} anos · ${ROLE_LABEL[m.role]||"🩰 Bailarina"}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
            ${m.whatsapp?bdayWppBtn(m.whatsapp,"Bailarina","#25D366",m.name):""}
            ${m.whatsappMae?bdayWppBtn(m.whatsappMae,"Mãe","#854278",m.name):""}
          </div>
        </div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

        <select id="status-select" onchange="toggleLoanField()">
          <option value="na_igreja">🏛️ Na Igreja</option>
          <option value="em_casa">🏠 Levou p/ Casa</option>
          <option value="emprestado">🔄 Emprestar para outra bailarina</option>
        </select>
      </div>
      <div class="field" id="loan-field" style="display:none">
        <label>Emprestar para qual bailarina? *</label>
        <select id="status-loan-to"></select>
      </div>
      <div class="field"><label>Observação (opcional)</label>
        <input id="status-notes" placeholder="Ex: Levou para ajustar o tamanho"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('modal-status')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveStatus()">Salvar</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
