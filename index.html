<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ministério de Dança – Igreja Hermom</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#FDF4FB;min-height:100vh;color:#2C1020}
  :root{--p:#C9607E;--d:#854278;--border:#EDD5E8;--light:#FDF4FB;--muted:#8B6080;--text:#2C1020}

  /* HEADER */
  #header{background:linear-gradient(135deg,var(--p),var(--d));color:#fff;padding:18px 16px 0;position:sticky;top:0;z-index:100}
  #header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  #header-top h1{font-size:20px;font-weight:800}
  #header-top p{font-size:13px;opacity:.85}
  #tabs{display:flex;gap:2px}
  .tab-btn{flex:1;background:transparent;color:rgba(255,255,255,.75);border:none;border-radius:10px 10px 0 0;padding:8px 4px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s}
  .tab-btn.active{background:#fff;color:var(--p)}
  .tab-btn svg{display:block;margin:0 auto 3px}

  /* SUMMARY BAR */
  #summary{background:#fff;padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px}
  .sum-item{flex:1;text-align:center}
  .sum-n{font-size:18px;font-weight:800;color:var(--p)}
  .sum-l{font-size:10px;color:var(--muted);font-weight:600}

  /* CONTENT */
  #content{padding:16px}
  .tab-panel{display:none}.tab-panel.active{display:block}

  /* CARDS */
  .card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
  .card-header{background:linear-gradient(135deg,var(--d),var(--p));color:#fff;padding:14px 16px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
  .card-body{padding:12px 16px;border-bottom:1px solid var(--border)}
  .card-footer{padding:10px 16px;background:var(--light)}

  /* SECTION TITLE */
  .sec-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .sec-title h2{font-size:18px;font-weight:700}
  .sec-title p{font-size:13px;color:var(--muted)}

  /* BUTTONS */
  .btn{border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--p);color:#fff}
  .btn-ghost{background:#f3e5f5;color:var(--d)}
  .btn-danger{background:#c62828;color:#fff}
  .btn-sm{padding:5px 12px;font-size:13px}
  .btn-icon{background:#ffffff33;border:none;color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:14px}

  /* BADGE */
  .badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}

  /* AVATAR */
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:1000;align-items:center;justify-content:center;padding:16px}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .modal-header{background:var(--p);color:#fff;padding:14px 18px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:15px}
  .modal-body{padding:18px}

  /* FORM */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;outline:none;background:var(--light);color:var(--text);font-family:inherit}
  .field textarea{resize:vertical;min-height:72px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

  /* MEMBER ROW */
  .member-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
  .member-row:last-child{border-bottom:none}
  .member-row.present{background:#e8f5e9}
  .check-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
  .check-circle.on{background:#2E7D32;color:#fff}
  .check-circle.off{background:#e0e0e0}

  /* SESSION CHIPS */
  .session-chip{border-radius:12px;padding:9px 14px;cursor:pointer;border:2px solid var(--border);background:#fff;min-width:95px;text-align:center}
  .session-chip.active{background:var(--p);color:#fff;border-color:var(--p)}
  .session-chip h4{font-size:14px;font-weight:700}
  .session-chip p{font-size:12px;opacity:.8}

  /* STATUS BUTTONS */
  .status-row{display:flex;gap:6px;flex-wrap:wrap}
  .status-btn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted)}

  /* FILTER CHIPS */
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .filter-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
  .filter-chip.active{background:var(--p);color:#fff;border-color:var(--p)}

  /* WARNING BAR */
  .warn-bar{padding:8px 16px;background:#fff3e0;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:#E65100}

  /* MEDIA PLAYER */
  .media-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .media-open{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;color:#fff}
  .media-link{background:#f3e5f5;color:var(--d);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;text-decoration:none}
  .media-player-wrap{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:10px}
  .media-player-bar{background:var(--light);padding:6px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:600}
  .media-player-bar a{color:var(--p);font-weight:600;font-size:12px}
  .media-player-bar button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px}
  iframe.player{width:100%;border:none;display:block}

  /* EMPTY STATE */
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .empty svg{margin-bottom:8px}

  /* YT THUMB */
  .yt-thumb{position:relative;background:#000;cursor:pointer}
  .yt-thumb img{width:100%;max-height:160px;object-fit:cover;display:block;opacity:.85}
  .yt-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .yt-play-btn{width:48px;height:48px;border-radius:50%;background:#FF0000cc;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}

  .inactive-label{font-size:13px;font-weight:700;color:var(--muted);margin:18px 0 8px}
  .link-detected{font-size:12px;margin-top:4px;font-weight:600}
</style>
</head>
<body>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── COLE SUAS CREDENCIAIS DO FIREBASE AQUI ───────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCx6KXqx3Qhk8Y2J-FuxAVNUe0mkpb2RsY",
  authDomain:        "ministerio-danca.firebaseapp.com",
  databaseURL:       "https://ministerio-danca-default-rtdb.firebaseio.com",
  projectId:         "ministerio-danca",
  storageBucket:     "ministerio-danca.firebasestorage.app",
  messagingSenderId: "697046196478",
  appId:             "1:697046196478:web:a3401e38676dbf0bd8c5af"
};
// ─────────────────────────────────────────────────────────────────────────────

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = { members:{}, attendance:{}, choreographies:{}, costumes:{} };
let activeTab = "members";
let selectedSession = null;
let choreoFilter = "all";

// ─── FIREBASE LISTENERS ───────────────────────────────────────────────────────
["members","attendance","choreographies","costumes"].forEach(k => {
  onValue(ref(db, k), snap => {
    state[k] = snap.val() || {};
    render();
  });
});

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(d){ if(!d) return ""; const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; }
function avatarColor(name){
  const hue=[...name].reduce((a,c)=>a+c.charCodeAt(0),0)%360;
  return `hsl(${hue},55%,62%)`;
}
function initials(name){ return name.split(" ").map(n=>n[0]).slice(0,2).join("").toUpperCase(); }
function activeMembers(){ return Object.entries(state.members).filter(([,m])=>m.active).map(([id,m])=>({id,...m})); }
function getMember(id){ const m=state.members[id]; return m?{id,...m}:null; }

function ytId(url){
  if(!url) return null;
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?/\s]{11})/);
  return m?m[1]:null;
}
function spotifyEmbed(url){
  if(!url) return null;
  const m=url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
  return m?`https://open.spotify.com/embed/${m[1]}/${m[2]}`:null;
}
function linkType(url){
  if(!url) return null;
  if(url.includes("youtube.com")||url.includes("youtu.be")) return "youtube";
  if(url.includes("spotify.com")) return "spotify";
  return "other";
}

// ─── TUTU SVG ─────────────────────────────────────────────────────────────────
function tutuSVG(size=24, color="#C9607E"){
  return `<svg width="${size}" height="${size}" viewBox="0 0 32 32">
    <path d="M13.5 3 Q16 2 18.5 3 L18 10 L14 10 Z" fill="${color}"/>
    <line x1="14" y1="3.5" x2="12" y2="3" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="3.5" x2="20" y2="3" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="16" cy="12.5" rx="8.5" ry="4" fill="${color}" opacity="1"/>
    <ellipse cx="16" cy="15" rx="11" ry="3.8" fill="${color}" opacity="0.7"/>
    <ellipse cx="16" cy="17.5" rx="13" ry="3.5" fill="${color}" opacity="0.45"/>
  </svg>`;
}

// ─── STATUS MAPS ──────────────────────────────────────────────────────────────
const COSTUME_STATUS = {
  na_igreja: { label:"Na Igreja",       color:"#2E7D32", icon:"🏛️" },
  em_casa:   { label:"Levou p/ Casa",   color:"#E65100", icon:"🏠" },
  devolvida: { label:"Devolvida",       color:"#1565C0", icon:"✅" },
  emprestada:{ label:"Emprestada",      color:"#6A1B9A", icon:"🔄" },
};
const CHOREO_STATUS = {
  planejado:   { label:"Planejado",    color:"#8B6080", icon:"📋" },
  em_ensaio:   { label:"Em Ensaio",    color:"#E65100", icon:"🎵" },
  pronto:      { label:"Pronto",       color:"#2E7D32", icon:"✅" },
  apresentado: { label:"Apresentado",  color:"#1565C0", icon:"🌟" },
};

function badge(status, type){
  const map = type==="costume" ? COSTUME_STATUS : CHOREO_STATUS;
  const s = map[status] || map[Object.keys(map)[0]];
  return `<span class="badge" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}55">${s.icon} ${s.label}</span>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  renderHeader();
  renderSummary();
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(`panel-${activeTab}`)?.classList.add("active");

  if(activeTab==="members")       renderMembers();
  else if(activeTab==="attendance") renderAttendance();
  else if(activeTab==="choreo")   renderChoreo();
  else if(activeTab==="costumes") renderCostumes();
}

function renderHeader(){
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.tab===activeTab);
  });
}

function renderSummary(){
  const am = activeMembers().length;
  const ensaios = Object.keys(state.attendance).length;
  const emEnsaio = Object.values(state.choreographies).filter(c=>c.status==="em_ensaio").length;
  const figs = Object.keys(state.costumes).length;
  document.getElementById("sum-bailarinas").textContent = am;
  document.getElementById("sum-ensaios").textContent = ensaios;
  document.getElementById("sum-coreografias").textContent = emEnsaio;
  document.getElementById("sum-figurinos").textContent = figs;
}

// ── MEMBERS ──────────────────────────────────────────────────────────────────
function renderMembers(){
  const all = Object.entries(state.members).map(([id,m])=>({id,...m}));
  const active = all.filter(m=>m.active);
  const inactive = all.filter(m=>!m.active);
  const el = document.getElementById("panel-members");
  el.innerHTML = `
    <div class="sec-title">
      <div><h2>🩰 Membros</h2><p>${active.length} ativas · ${inactive.length} inativas</p></div>
      <button class="btn btn-primary btn-sm" onclick="openMemberModal()">+ Adicionar</button>
    </div>
    ${active.map(m=>`
      <div class="card" style="display:flex;align-items:center;gap:12px">
        <div class="avatar" style="width:38px;height:38px;font-size:14px;background:${avatarColor(m.name)}">${initials(m.name)}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:15px">${esc(m.name)}</div>
          <div style="font-size:12px;color:var(--muted)">
              ${{lider:"👑 Líder",co_lider:"🌟 Co-líder",auxiliar:"🤝 Auxiliar"}[m.role]||"🩰 Bailarina"}
              ${m.mother?` · 👩 ${esc(m.mother)}`:""}
            </div>
            <div style="font-size:12px;color:var(--muted)">
              ${m.whatsapp?`📱 ${esc(m.whatsapp)}`:""}${m.whatsapp&&m.whatsappMae?" · ":""}${m.whatsappMae?`👩 ${esc(m.whatsappMae)}`:""}
            </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openMemberModal('${m.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMember('${m.id}')">🗑️</button>
      </div>`).join("")}
    ${inactive.length>0?`<div class="inactive-label">INATIVAS</div>${inactive.map(m=>`
      <div class="card" style="display:flex;align-items:center;gap:12px;opacity:.6;background:#f5f5f5">
        <div class="avatar" style="width:32px;height:32px;font-size:12px;background:${avatarColor(m.name)}">${initials(m.name)}</div>
        <div style="flex:1;font-size:14px;color:var(--muted)">${esc(m.name)}</div>
        <button class="btn btn-ghost btn-sm" onclick="openMemberModal('${m.id}')">✏️</button>
      </div>`).join("")}`:""}
    ${all.length===0?`<div class="empty">${tutuSVG(52)}<p>Nenhum membro cadastrado ainda</p></div>`:""}
  `;
}

function openMemberModal(id){
  const m = id ? state.members[id] : null;
  document.getElementById("member-modal-title").textContent = m?"Editar Membro":"Adicionar Membro";
  document.getElementById("member-id").value = id||"";
  document.getElementById("member-name").value = m?.name||"";
  document.getElementById("member-role").value = m?.role||"membro";
  document.getElementById("member-whatsapp").value = m?.whatsapp||"";
  document.getElementById("member-active").checked = m ? m.active : true;
  openModal("modal-member");
}
window.openMemberModal = openMemberModal;

window.saveMember = async function(){
  const id = document.getElementById("member-id").value;
  const name = document.getElementById("member-name").value.trim();
  if(!name){ alert("Nome obrigatório"); return; }
  const data = {
    name,
    mother: document.getElementById("member-mother").value.trim(),
    role: document.getElementById("member-role").value,
    whatsapp: document.getElementById("member-whatsapp").value.trim(),
    whatsappMae: document.getElementById("member-whatsapp-mae").value.trim(),
    active: document.getElementById("member-active").checked
  };
  if(id) await set(ref(db,`members/${id}`), data);
  else    await push(ref(db,"members"), data);
  closeModal("modal-member");
};

window.deleteMember = async function(id){
  if(confirm("Remover membro?")) await remove(ref(db,`members/${id}`));
};

// ── ATTENDANCE ───────────────────────────────────────────────────────────────
function renderAttendance(){
  const sessions = Object.entries(state.attendance).map(([id,s])=>({id,...s}))
    .sort((a,b)=>b.date.localeCompare(a.date));
  const cur = sessions.find(s=>s.id===selectedSession);
  const am = activeMembers();
  const el = document.getElementById("panel-attendance");

  el.innerHTML = `
    <div class="sec-title">
      <div><h2>📋 Lista de Presença</h2><p>${sessions.length} ensaio(s)</p></div>
      <button class="btn btn-primary btn-sm" onclick="openAttModal()">+ Novo Ensaio</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      ${sessions.map(s=>{
        const cnt = s.records?Object.values(s.records).filter(r=>r.present).length:0;
        const tot = s.records?Object.values(s.records).length:0;
        return `<div class="session-chip${s.id===selectedSession?" active":""}" onclick="selectSession('${s.id}')">
          <h4>${fmtDate(s.date)}</h4><p>${cnt}/${tot} presentes</p></div>`;
      }).join("")}
    </div>
    ${cur?`
    <div style="background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden">
      <div style="background:var(--p);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
        <div><b>Ensaio – ${fmtDate(cur.date)}</b>${cur.notes?`<div style="font-size:12px;opacity:.85">${esc(cur.notes)}</div>`:""}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:13px">${cur.records?Object.values(cur.records).filter(r=>r.present).length:0}/${cur.records?Object.values(cur.records).length:0}</span>
          <button class="btn-icon" onclick="deleteSession('${cur.id}')">🗑️</button>
        </div>
      </div>
      ${am.length===0?`<div style="padding:20px;text-align:center;color:var(--muted)">Cadastre membros primeiro</div>`
      :am.map(m=>{
        const rec = cur.records?Object.values(cur.records).find(r=>r.memberId===m.id):null;
        const present = rec?.present||false;
        return `<div class="member-row${present?" present":""}" onclick="toggleAttendance('${cur.id}','${m.id}')">
          <div class="avatar" style="width:34px;height:34px;font-size:13px;background:${avatarColor(m.name)}">${initials(m.name)}</div>
          <div style="flex:1"><div style="font-weight:600;font-size:14px">${esc(m.name)}</div>
            <div style="font-size:12px;color:var(--muted)">${m.role==="lider"?"👑 Líder":"🩰 Bailarina"}</div></div>
          <div class="check-circle ${present?"on":"off"}">${present?"✓":""}</div>
        </div>`;
      }).join("")}
    </div>`:""}
    ${sessions.length===0?`<div class="empty"><div style="font-size:48px;margin-bottom:8px">📋</div><p>Nenhum ensaio registrado</p></div>`:""}
  `;
}

window.openAttModal = function(){
  document.getElementById("att-date").value="";
  document.getElementById("att-notes").value="";
  openModal("modal-att");
};

window.saveSession = async function(){
  const date = document.getElementById("att-date").value;
  if(!date){ alert("Selecione a data"); return; }
  const notes = document.getElementById("att-notes").value.trim();
  const am = activeMembers();
  const records = {};
  am.forEach(m=>{ const k=push(ref(db,"_tmp")).key; records[k]={memberId:m.id,present:false}; });
  const newRef = push(ref(db,"attendance"));
  await set(newRef,{date,notes,records});
  selectedSession = newRef.key;
  closeModal("modal-att");
};

window.selectSession = function(id){ selectedSession = selectedSession===id?null:id; renderAttendance(); };

window.toggleAttendance = async function(sessionId, memberId){
  const session = state.attendance[sessionId];
  if(!session) return;
  const records = session.records||{};
  const key = Object.keys(records).find(k=>records[k].memberId===memberId);
  if(key){
    await update(ref(db,`attendance/${sessionId}/records/${key}`),{present:!records[key].present});
  } else {
    const k = push(ref(db,"_tmp")).key;
    await set(ref(db,`attendance/${sessionId}/records/${k}`),{memberId,present:true});
  }
};

window.deleteSession = async function(id){
  if(confirm("Remover este ensaio?")){ await remove(ref(db,`attendance/${id}`)); if(selectedSession===id) selectedSession=null; }
};

// ── CHOREO ───────────────────────────────────────────────────────────────────
function renderChoreo(){
  const all = Object.entries(state.choreographies).map(([id,c])=>({id,...c}));
  const list = choreoFilter==="all" ? all : all.filter(c=>c.status===choreoFilter);
  const el = document.getElementById("panel-choreo");

  el.innerHTML = `
    <div class="sec-title">
      <div><h2>🎵 Coreografias</h2><p>${all.length} hino(s)</p></div>
      <button class="btn btn-primary btn-sm" onclick="openChoreoModal()">+ Adicionar</button>
    </div>
    <div class="filter-row">
      ${[["all","Todos","🎵"],...Object.entries(CHOREO_STATUS).map(([k,v])=>[k,v.label,v.icon])].map(([k,l,ic])=>
        `<div class="filter-chip${choreoFilter===k?" active":""}" onclick="setChoreoFilter('${k}')">${ic} ${l}</div>`
      ).join("")}
    </div>
    ${list.map(c=>{
      const yt = ytId(c.link);
      const lt = linkType(c.link);
      const displayTitle = c.title && c.title!==c.link ? c.title : (lt==="youtube"?"Hino no YouTube":lt==="spotify"?"Hino no Spotify":"Hino");
      return `
      <div style="background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden">
        ${lt==="youtube"&&yt?`<div class="yt-thumb"><img src="https://img.youtube.com/vi/${yt}/hqdefault.jpg" alt="thumb"><div class="yt-play"><div class="yt-play-btn">▶</div></div></div>`:""}
        <div style="padding:14px 16px">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <div style="flex:1">
              <div style="font-weight:700;font-size:16px;margin-bottom:4px">🎶 ${esc(displayTitle)}</div>
              ${c.event?`<div style="font-size:13px;color:var(--muted);margin-bottom:4px">📅 ${esc(c.event)}</div>`:""}
              ${c.notes?`<div style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:4px">"${esc(c.notes)}"</div>`:""}
              ${c.link?`<span style="font-size:11px;border-radius:20px;padding:2px 8px;font-weight:700;background:${lt==="youtube"?"#FF000022":lt==="spotify"?"#1DB95422":"#eee"};color:${lt==="youtube"?"#cc0000":lt==="spotify"?"#1DB954":"var(--muted)"}">
                ${lt==="youtube"?"▶ YouTube":lt==="spotify"?"🎧 Spotify":"🔗 Link"}</span>`:""}
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="openChoreoModal('${c.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteChoreo('${c.id}')">🗑️</button>
            </div>
          </div>
          <div style="margin-top:10px">${badge(c.status,"choreo")}</div>
          ${c.link?`<div id="media-${c.id}">${renderMediaBtns(c.id,c.link)}</div>`:""}
        </div>
        <div class="card-footer">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600">ALTERAR STATUS:</div>

            ${Object.entries(CHOREO_STATUS).map(([k,v])=>`
              <button class="status-btn" style="${c.status===k?`border-color:${v.color};background:${v.color}22;color:${v.color}`:""}"
                onclick="updateChoreoStatus('${c.id}','${k}')">${v.icon} ${v.label}</button>`).join("")}
          </div>
        </div>
      </div>`;
    }).join("")}
    ${list.length===0?`<div class="empty"><div style="font-size:48px;margin-bottom:8px">🎵</div><p>Nenhuma coreografia encontrada</p></div>`:""}
  `;
}

function renderMediaBtns(id, url){
  const lt = linkType(url);
  const color = lt==="youtube"?"#FF0000":lt==="spotify"?"#1DB954":"#C9607E";
  const label = lt==="youtube"?"▶ Assistir aqui":lt==="spotify"?"🎧 Ouvir aqui":"▶ Abrir";
  const extLabel = lt==="youtube"?"↗ Abrir no YouTube":lt==="spotify"?"↗ Abrir no Spotify":"↗ Abrir link";
  return `<div class="media-btns">
    <button class="media-open" style="background:${color}" onclick="openPlayer('${id}','${encodeURIComponent(url)}')">${label}</button>
    <a class="media-link" href="${esc(url)}" target="_blank">${extLabel}</a>
  </div>`;
}

window.openPlayer = function(id, encodedUrl){
  const url = decodeURIComponent(encodedUrl);
  const lt = linkType(url);
  const yt = ytId(url);
  const sp = spotifyEmbed(url);
  const label = lt==="youtube"?"▶ YouTube":"🎧 Spotify";
  let iframe="";
  if(lt==="youtube"&&yt) iframe=`<iframe class="player" height="200" src="https://www.youtube.com/embed/${yt}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  else if(lt==="spotify"&&sp) iframe=`<iframe class="player" height="152" src="${sp}" allow="autoplay;encrypted-media"></iframe>`;
  else iframe=`<div style="padding:12px;text-align:center"><a href="${esc(url)}" target="_blank" style="color:var(--p)">Abrir link externo ↗</a></div>`;
  document.getElementById(`media-${id}`).innerHTML=`
    <div class="media-player-wrap">
      <div class="media-player-bar">
        <span>${label}</span>
        <div style="display:flex;gap:8px">
          <a href="${esc(url)}" target="_blank">↗ Abrir</a>
          <button onclick="closePlayer('${id}','${encodeURIComponent(url)}')">✕</button>
        </div>
      </div>
      ${iframe}
    </div>`;
};
window.closePlayer = function(id, encodedUrl){ document.getElementById(`media-${id}`).innerHTML=renderMediaBtns(id,decodeURIComponent(encodedUrl)); };

window.setChoreoFilter = function(f){ choreoFilter=f; renderChoreo(); };

window.openChoreoModal = function(id){
  const c = id ? state.choreographies[id] : null;
  document.getElementById("choreo-modal-title").textContent = c?"Editar Coreografia":"Nova Coreografia";
  document.getElementById("choreo-id").value = id||"";
  document.getElementById("choreo-link").value = c?.link||"";
  document.getElementById("choreo-title").value = (c?.title && c.title!==c?.link)?c.title:"";
  document.getElementById("choreo-event").value = c?.event||"";
  document.getElementById("choreo-status").value = c?.status||"planejado";
  document.getElementById("choreo-notes").value = c?.notes||"";
  document.getElementById("choreo-link-hint").textContent="";
  openModal("modal-choreo");
};
window.openChoreoModal = window.openChoreoModal;

window.onChoreoLinkChange = function(){
  const url = document.getElementById("choreo-link").value;
  const lt = linkType(url);
  const hint = document.getElementById("choreo-link-hint");
  if(!url){ hint.textContent=""; return; }
  if(lt==="youtube"){ hint.textContent="▶ Link do YouTube detectado"; hint.style.color="#cc0000"; }
  else if(lt==="spotify"){ hint.textContent="🎧 Link do Spotify detectado"; hint.style.color="#1DB954"; }
  else { hint.textContent="🔗 Link externo"; hint.style.color="var(--muted)"; }
};

window.saveChoreo = async function(){
  const id = document.getElementById("choreo-id").value;
  const link = document.getElementById("choreo-link").value.trim();
  const title = document.getElementById("choreo-title").value.trim() || link;
  if(!link&&!title){ alert("Cole o link ou informe um nome"); return; }
  const data = {
    link, title,
    event: document.getElementById("choreo-event").value.trim(),
    status: document.getElementById("choreo-status").value,
    notes: document.getElementById("choreo-notes").value.trim(),
    createdAt: new Date().toISOString().slice(0,10)
  };
  if(id) await set(ref(db,`choreographies/${id}`),data);
  else   await push(ref(db,"choreographies"),data);
  closeModal("modal-choreo");
};

window.updateChoreoStatus = async function(id,status){ await update(ref(db,`choreographies/${id}`),{status}); };
window.deleteChoreo = async function(id){ if(confirm("Remover coreografia?")) await remove(ref(db,`choreographies/${id}`)); };

function renderCostumes(){
  const all = Object.entries(state.costumes).map(([id,c])=>({id,...c}));
  const el = document.getElementById("panel-costumes");

  el.innerHTML = `
    <div class="sec-title">
      <div>
        <h2 style="display:flex;align-items:center;gap:8px">${tutuSVG(24)} Figurinos</h2>
        <p>${all.length} figurino(s)</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openCostumeModal()">+ Novo Figurino</button>
    </div>
    ${all.map(c=>{
      const items = c.items?Object.entries(c.items).map(([kid,i])=>({kid,...i})):[];
      const emCasa = items.filter(i=>i.status==="em_casa");
      const emprestada = items.filter(i=>i.status==="emprestada");
      return `
      <div style="background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:10px">
            ${tutuSVG(30,"#fff")}
            <div>
              <div style="font-weight:700;font-size:16px">${esc(c.name)}</div>
              ${c.description?`<div style="font-size:12px;opacity:.85">${esc(c.description)}</div>`:""}
            </div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-icon" onclick="openRecordModal('${c.id}')">+ Registrar</button>
            <button class="btn-icon" onclick="openCostumeModal('${c.id}')">✏️</button>
            <button style="background:#ff000033;border:none;color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer" onclick="deleteCostume('${c.id}')">🗑️</button>
          </div>
        </div>
        ${(emCasa.length||emprestada.length)?`<div class="warn-bar">⚠️ ${emCasa.length?`${emCasa.length} fora da igreja`:""}${emCasa.length&&emprestada.length?" · ":""}${emprestada.length?`${emprestada.length} emprestado(s)`:""}</div>`:""}
        ${items.length===0?`<div style="padding:14px;text-align:center;color:var(--muted);font-size:13px">Nenhum registro · clique em "+ Registrar"</div>`
        :items.map(item=>{
          const m = getMember(item.memberId);
          if(!m) return "";
          return `<div class="card-body" style="display:flex;align-items:center;gap:12px">
            <div class="avatar" style="width:32px;height:32px;font-size:12px;background:${avatarColor(m.name)}">${initials(m.name)}</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${esc(m.name)}</div>
              ${item.notes?`<div style="font-size:12px;color:var(--muted)">${esc(item.notes)}</div>`:""}
              ${item.date?`<div style="font-size:11px;color:var(--muted)">Atualizado: ${item.date.split("-").reverse().join("/")}</div>`:""}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              ${badge(item.status,"costume")}
              <button onclick="removeCostumeItem('${c.id}','${item.kid}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px">remover</button>
            </div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}
    ${all.length===0?`<div class="empty">${tutuSVG(52)}<p>Nenhum figurino cadastrado</p></div>`:""}
  `;
}

window.saveCostume = async function(){
  const id = document.getElementById("costume-id").value;
  const name = document.getElementById("costume-name").value.trim();
  if(!name){ alert("Nome obrigatório"); return; }
  const data = { name, description: document.getElementById("costume-desc").value.trim(), items:{} };
  if(id){ await update(ref(db,`costumes/${id}`),{name:data.name,description:data.description}); }
  else   { await push(ref(db,"costumes"),data); }
  closeModal("modal-costume");
};

window.deleteCostume = async function(id){ if(confirm("Remover figurino?")) await remove(ref(db,`costumes/${id}`)); };

window.openRecordModal = function(costumeId){
  const am = activeMembers();
  document.getElementById("record-costume-id").value = costumeId;
  const sel = document.getElementById("record-member");
  sel.innerHTML = `<option value="">Selecione...</option>${am.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join("")}`;
  document.getElementById("record-status").value = "na_igreja";
  document.getElementById("record-notes").value = "";
  openModal("modal-record");
};

window.saveRecord = async function(){
  const costumeId = document.getElementById("record-costume-id").value;
  const memberId = document.getElementById("record-member").value;
  if(!memberId){ alert("Selecione um membro"); return; }
  const status = document.getElementById("record-status").value;
  const notes = document.getElementById("record-notes").value.trim();
  const date = new Date().toISOString().slice(0,10);
  // Check if already exists
  const existing = state.costumes[costumeId]?.items;
  let existingKey = null;
  if(existing) existingKey = Object.keys(existing).find(k=>existing[k].memberId===memberId);
  if(existingKey) await update(ref(db,`costumes/${costumeId}/items/${existingKey}`),{status,notes,date});
  else            await push(ref(db,`costumes/${costumeId}/items`),{memberId,status,notes,date});
  closeModal("modal-record");
};

window.removeCostumeItem = async function(costumeId, kid){
  await remove(ref(db,`costumes/${costumeId}/items/${kid}`));
};

window.maskPhone = function(el){
  let v = el.value.replace(/\D/g,"").slice(0,11);
  if(v.length > 10)
    v = v.replace(/^(\d{2})(\d{5})(\d{4})$/,"($1) $2-$3");
  else if(v.length > 6)
    v = v.replace(/^(\d{2})(\d{4})(\d*)$/,"($1) $2-$3");
  else if(v.length > 2)
    v = v.replace(/^(\d{2})(\d*)$/,"($1) $2");
  else if(v.length > 0)
    v = v.replace(/^(\d*)$/,"($1");
  el.value = v;
};
function openModal(id){ document.getElementById(id).classList.add("open"); }
function closeModal(id){ document.getElementById(id).classList.remove("open"); }
window.closeModal = closeModal;

        <button class="btn btn-ghost" onclick="closeModal('modal-costume')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveCostume()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: RECORD -->
<div class="modal-overlay" id="modal-record">
  <div class="modal">
    <div class="modal-header">
      <span>Registrar Figurino</span>
      <button class="btn-icon" onclick="closeModal('modal-record')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="record-costume-id">
      <div class="field"><label>Membro *</label><select id="record-member"></select></div>
      <div class="field"><label>Status *</label>
        <select id="record-status">
          <option value="na_igreja">🏛️ Na Igreja</option>
          <option value="em_casa">🏠 Levou p/ Casa</option>
          <option value="devolvida">✅ Devolvida</option>
          <option value="emprestada">🔄 Emprestada</option>
        </select>
      </div>
      <div class="field"><label>Observação</label><input id="record-notes" placeholder="Ex: Emprestado para a Maria no culto de 10/06"></div>

        <button class="btn btn-ghost" onclick="closeModal('modal-record')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveRecord()">Salvar</button>

    </div>
  </div>
</div>
